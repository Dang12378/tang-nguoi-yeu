<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Love Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Poppins", sans-serif;
}

/* TITLE */
#title {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 60px;
  font-weight: 900;
  z-index: 9999;
  text-shadow: 0 0 20px white, 0 0 40px cyan;
}

/* CAPTION */
#caption {
  position: fixed;
  bottom: 50px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 55px;
  font-weight: 800;
  z-index: 9999;
  text-shadow: 0 0 15px white, 0 0 30px pink, 0 0 60px hotpink;
}

/* HEART */
.heart {
  position: fixed;
  color: pink;
  font-size: 22px;
  pointer-events: none;
  z-index: 99999;
  animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-600px) scale(1.6); opacity: 0; }
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
  z-index: 999999;
}

#lightbox img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 20px;
  box-shadow: 0 0 40px white;
}

canvas { display: block; }
</style>
</head>

<body>

<div id="title">Gửi em bé xinh đẹp của anh</div>
<div id="caption">Cảm ơn em vì đã yêu anh. Anh yêu em rất nhiều</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightbox-img">
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 10, 45);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

// ================= STARS =================
const starGeo = new THREE.BufferGeometry();
const starCount = 12000;

let pos = [];

for(let i=0;i<starCount;i++){
  pos.push(
    (Math.random()-0.5)*900,
    (Math.random()-0.5)*900,
    (Math.random()-0.5)*900
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));

const stars = new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({ color:0xffffff, size:0.7 })
);

scene.add(stars);

// ================= MOON =================
const loader = new THREE.TextureLoader();

const moon = new THREE.Mesh(
  new THREE.SphereGeometry(6,64,64),
  new THREE.MeshStandardMaterial({
    map: loader.load("https://threejs.org/examples/textures/planets/moon_1024.jpg")
  })
);

scene.add(moon);

// ================= 14 IMAGES =================
const images = Array.from({length:14}, (_,i)=>
  `images/img${i+1}.jpg`
);

const meshes = [];

images.forEach((url)=>{
  loader.load(url,(texture)=>{
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(4,5),
      new THREE.MeshBasicMaterial({ map:texture })
    );
    scene.add(mesh);
    meshes.push(mesh);
  });
});

// ================= LIGHTBOX =================
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

function openImage(url){
  lightbox.style.display = "flex";
  lightboxImg.src = url;
}

lightbox.addEventListener("click",()=>{
  lightbox.style.display = "none";
});

window.addEventListener("keydown",(e)=>{
  if(e.key === "Escape"){
    lightbox.style.display = "none";
  }
});

// ================= HEART =================
function spawnHeart(){
  for(let i=0;i<6;i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";

    h.style.left = Math.random()*window.innerWidth + "px";
    h.style.top = window.innerHeight + "px";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
}

setInterval(()=>{
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  h.style.left = Math.random()*window.innerWidth + "px";
  h.style.top = window.innerHeight + "px";

  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
},400);

// ================= ORBIT CONTROL =================
let radius = 45;
let theta = 0;
let phi = 1.3;

let isDragging = false;
let prevX = 0;
let prevY = 0;

window.addEventListener("mousedown",(e)=>{
  isDragging = true;
  prevX = e.clientX;
  prevY = e.clientY;
});

window.addEventListener("mouseup",()=>isDragging=false);

window.addEventListener("mousemove",(e)=>{
  if(!isDragging) return;

  let dx = e.clientX - prevX;
  let dy = e.clientY - prevY;

  theta -= dx * 0.005;
  phi -= dy * 0.005;

  if(phi < 0.5) phi = 0.5;
  if(phi > 2.5) phi = 2.5;

  prevX = e.clientX;
  prevY = e.clientY;
});

window.addEventListener("wheel",(e)=>{
  radius += e.deltaY * 0.05;
  if(radius < 15) radius = 15;
  if(radius > 120) radius = 120;
});

// ================= MUSIC + CLICK =================
const music = document.getElementById("music");
let musicStarted = false;

window.addEventListener("click",(e)=>{

  if(!musicStarted){
    music.play();
    musicStarted = true;
  }

  spawnHeart();

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);

  const hits = raycaster.intersectObjects(meshes);

  if(hits.length){
    const mesh = hits[0].object;
    const img = mesh.material.map.image.src;
    openImage(img);
  }
});

// ================= ANIMATE =================
let angle = 0;

function animate(){
  requestAnimationFrame(animate);

  camera.position.x = radius * Math.sin(phi) * Math.cos(theta);
  camera.position.y = radius * Math.cos(phi);
  camera.position.z = radius * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(0,0,0);

  moon.rotation.y += 0.002;
  stars.rotation.y += 0.0002;

  meshes.forEach((m,i)=>{
    const a = angle + i*(Math.PI*2/meshes.length);

    m.position.x = Math.cos(a)*18;
    m.position.y = Math.sin(a*2)*3;
    m.position.z = Math.sin(a)*12;

    m.lookAt(camera.position);
  });

  angle += 0.002;

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
